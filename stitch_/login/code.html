<body class="bg-surface min-h-screen flex flex-col items-center selection:bg-primary-container selection:text-on-primary-container">
<!-- Suppressed Shell: Login page is transactional, Navigation hidden to focus user -->
<main class="flex-grow w-full flex flex-col items-center justify-center px-6 py-12 bg-login-gradient">
<!-- Header / Logo -->
<header class="mb-12 text-center">
<div class="inline-flex items-center justify-center p-3 rounded-xl bg-surface-container-lowest shadow-sm mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="bubble_chart">bubble_chart</span>
</div>
<h1 class="text-4xl font-black italic tracking-tighter text-on-surface font-headline">
                Kinetic
            </h1>
</header>
<!-- Login Card -->
<section class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_10px_30px_rgba(20,47,79,0.04),0_2px_8px_rgba(20,47,79,0.02)] p-8 md:p-10 border border-outline-variant/10">
<div class="space-y-1 mb-8">
<h2 class="text-2xl font-bold text-on-surface font-headline">欢迎回来</h2>
<p class="text-on-surface-variant text-sm">请输入您的凭据以访问账户</p>
</div>
<form action="#" class="space-y-5">
<!-- Phone/Email Field -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="identifier">手机号码或邮箱</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full pl-11 pr-4 py-4 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-high transition-all outline-none" id="identifier" name="identifier" placeholder="hello@kinetic.app" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant" for="password">密码</label>
<a class="text-xs font-semibold text-primary hover:text-primary-dim transition-colors" href="#">忘记密码？</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="lock_open">lock_open</span>
</div>
<input class="w-full pl-11 pr-4 py-4 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-high transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full py-4 bg-primary text-on-primary font-bold rounded-xl shadow-lg shadow-primary/20 hover:bg-primary-dim active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2" type="submit">
<span>登录</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="px-4 text-xs font-bold text-outline-variant uppercase tracking-widest">或通过以下方式登录</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-colors border border-outline-variant/5">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google multi-colored 'G' brand logo icon on a clean transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxt3GdSYcVhWWyE4BM9zN4a7rTAnw5YfzOz0HpMH5lybioJRojXWpFSBQPaF7IMehg8W7s_QgVmb7Yq4TBL3mwkPZsEwYvV48vGiddKuYYKHKZIxsD4kshTa0tKoLahaW_oem0Pa6IiS3HFM2B74GwQzAfKqtMKqOBVj-TrzUnw03QIeyH4oJi3ElnwuJZeSQ0qCR6cGHOEUEmNruIood9MF-LZP4kUfBouzDWnhRzWvj0FsVX6J7NNCpc9mvjVh9YfmkJffXNa7A"/>
<span class="text-sm font-semibold text-on-surface">Google 账号</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-colors border border-outline-variant/5">
<span class="material-symbols-outlined text-xl" data-icon="code">code</span>
<span class="text-sm font-semibold text-on-surface">GitHub 账号</span>
</button>
</div>
<!-- Toggle Sign Up -->
<p class="mt-10 text-center text-sm text-on-surface-variant">还没有账号？ <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">立即注册</a></p>
</section>
<!-- Image Decoration (Editorial Kineticism style) -->
<div class="hidden lg:block absolute right-12 bottom-12 w-64 h-64 opacity-20 pointer-events-none">
<div class="w-full h-full rounded-full bg-gradient-to-br from-primary to-primary-container blur-3xl"></div>
</div>
